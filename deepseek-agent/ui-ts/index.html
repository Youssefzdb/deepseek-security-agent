<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek Security Agent</title>
  <style>
    /* ─── Reset & font ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:    #c8aa50;
      --gold2:   #a08840;
      --bg:      #000;
      --bg2:     #080808;
      --bg3:     #0e0e0e;
      --border:  #1a1a1a;
      --dwhite:  #c8c8b8;
      --gray:    #585858;
      --orange:  #d4905a;
      --teal:    #5abcd4;
      --green:   #56c27a;
      --red:     #c25656;
      --font:    'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', monospace;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg); color: var(--dwhite);
      font-family: var(--font); font-size: 13px;
      overflow: hidden;          /* ← No page scroll ever */
    }

    /* ─── App shell — fixed layout, 3 rows ──────────────────────────────── */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0;                /* revealed after login */
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    #hdr {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      min-height: 64px;
    }

    /* 3D rotating mask — canvas */
    #mask-canvas {
      width: 52px; height: 52px;
      border-radius: 6px;
      flex-shrink: 0;
      display: block;
    }

    #hdr-title {
      display: flex; flex-direction: column; gap: 2px;
    }
    #hdr-title .name {
      font-size: 13px; font-weight: 700;
      color: var(--gold); letter-spacing: 2px; text-transform: uppercase;
    }
    #hdr-title .sub {
      font-size: 10px; color: var(--gray); letter-spacing: 1px;
    }

    /* Thinking indicator (inline) */
    #think {
      margin-left: auto;
      font-size: 11px; color: var(--gold2);
      opacity: 0; transition: opacity 0.2s;
      white-space: nowrap;
    }
    #think.vis { opacity: 1; }
    #think::before { content: "⟳ "; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Status bar (between header and chat) ───────────────────────────── */
    #sb {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 12px;
      padding: 4px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      font-size: 10px; color: var(--gray);
    }
    #sb-sep { color: var(--border); }
    #sb-model { color: var(--teal); }
    #sb-status { color: var(--green); }
    #sb-spin { display: none; }
    #sb-spin.vis { display: inline; animation: spin 1.2s linear infinite; }

    /* ─── Main content area ─────────────────────────────────────────────── */
    #main {
      flex: 1 1 0;               /* fills remaining height */
      display: flex;
      overflow: hidden;          /* children handle their own scroll */
    }

    /* ─── Sidebar todo panel ────────────────────────────────────────────── */
    #todo {
      flex: 0 0 220px;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      display: none;             /* hidden until tasks appear */
      flex-direction: column;
      overflow: hidden;
    }
    #todo.vis { display: flex; }
    #todo-hdr {
      font-size: 10px; color: var(--gray);
      padding: 10px 14px 6px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 1px; text-transform: uppercase;
    }
    /* Progress bar */
    #to-bar {
      height: 2px; background: var(--border); margin: 0 14px 8px;
    }
    #to-fill {
      height: 100%; background: var(--gold);
      transition: width 0.3s ease;
      width: 0%;
    }
    #to-items {
      flex: 1; overflow-y: auto;
      padding: 0 12px 8px;
      scrollbar-width: none;
    }
    #to-items::-webkit-scrollbar { display: none; }
    .to-item {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 5px 2px; font-size: 11px;
      border-bottom: 1px solid var(--border);
    }
    .to-item:last-child { border-bottom: none; }
    .ti { flex-shrink: 0; width: 12px; font-size: 11px; }
    .ti.p { color: var(--gray); }
    .ti.i { color: var(--gold); }
    .ti.c { color: var(--green); }
    .ti.x { color: var(--red); }
    .tt { color: var(--dwhite); line-height: 1.4; word-break: break-word; }
    .tt.d { color: var(--gray); text-decoration: line-through; }

    /* ─── Chat pane ─────────────────────────────────────────────────────── */
    #chat {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Message scroll area — THIS is the only thing that scrolls */
    #msgs {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 18px 22px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #msgs::-webkit-scrollbar { width: 4px; }
    #msgs::-webkit-scrollbar-track { background: transparent; }
    #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Message bubbles ────────────────────────────────────────────────── */
    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 800px; }
    .ml { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .ml.u { color: var(--gold); }
    .ml.a { color: var(--teal); }
    .ml.s { color: var(--gray); }
    .mb {
      padding: 10px 14px; border-radius: 6px;
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      font-size: 12px;
    }
    .mb.u { background: #0d0d0d; border: 1px solid #1e1e1e; color: var(--dwhite); align-self: flex-end; }
    .mb.a { background: #06090d; border: 1px solid #12243a; color: #a8cce8; }
    .mb.s { background: transparent; color: var(--gray); font-size: 11px; border: none; padding: 2px 0; }

    /* ─── Bash block ──────────────────────────────────────────────────────── */
    .bash {
      background: #080808; border: 1px solid #1e1e1e; border-radius: 6px;
      overflow: hidden; font-size: 11px;
    }
    .bh {
      background: #0e0e0e; padding: 5px 12px;
      border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 0;
    }
    .ar { color: var(--orange); font-size: 10px; }
    .bn { color: var(--gray);   font-size: 10px; }
    .bc { padding: 10px 12px; color: #98d4a8; line-height: 1.6; }
    .pr { color: var(--gold2); user-select: none; }

    /* ─── Output block ───────────────────────────────────────────────────── */
    .out {
      background: #050505; border: 1px solid #151515; border-radius: 6px;
      padding: 10px 12px; font-size: 11px;
    }
    .out-title { color: var(--gray); font-size: 10px; margin-bottom: 6px; letter-spacing: 1px; }
    .out pre   { color: #8ab8a8; line-height: 1.6; }

    /* ─── File event ─────────────────────────────────────────────────────── */
    .fev {
      font-size: 11px; padding: 3px 0;
      display: flex; align-items: center; gap: 8px;
    }

    /* ─── Input bar — fixed at bottom ────────────────────────────────────── */
    #inp-row {
      flex: 0 0 auto;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 12px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    #inp-prompt {
      color: var(--gold); font-size: 13px; user-select: none; flex-shrink: 0;
    }
    #inp {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--dwhite); font-family: var(--font); font-size: 13px;
      caret-color: var(--gold);
    }
    #inp::placeholder { color: #333; }
    #inp:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <div id="hdr">
      <!-- 3D rotating Anonymous mask (drawn by mask-init.ts) -->
      <canvas id="mask-canvas" width="52" height="52"></canvas>

      <div id="hdr-title">
        <span class="name">DeepSeek Security Agent</span>
        <span class="sub" id="sb-model">—</span>
      </div>

      <div id="think">Thinking…</div>
    </div>

    <!-- ── Thin status bar ─────────────────────────────────────────────── -->
    <div id="sb">
      <span>⟳ <span id="sb-spin" class="vis">●</span></span>
      <span id="sb-sep">·</span>
      <span id="sb-status">idle</span>
      <span id="sb-sep">·</span>
      msgs: <span id="sb-count">0</span>
    </div>

    <!-- ── Main (sidebar + chat) ───────────────────────────────────────── -->
    <div id="main">

      <!-- Todo sidebar -->
      <div id="todo">
        <div id="todo-hdr">Tasks</div>
        <div id="to-bar"><div id="to-fill"></div></div>
        <div id="to-items"></div>
      </div>

      <!-- Chat -->
      <div id="chat">
        <!-- Scrollable messages — only this scrolls -->
        <div id="msgs"></div>

        <!-- Fixed input bar -->
        <div id="inp-row">
          <span id="inp-prompt">›</span>
          <input id="inp" type="text" autocomplete="off"
            placeholder="Enter command or question… (/help)" />
        </div>
      </div>

    </div>
  </div>

  <!-- Three.js CDN (used by mask-init.ts and login.ts) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
    }
  }
  </script>

  <!-- Main app entry -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
